<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weather-web-app</title>
    <link rel="stylesheet" href="/style/style.css">
</head>
<body>
    <section class="weather">
        <div class="weather__top">
            <p class="weather__date">Date</p>
            <p class="weather__location">
                <img src="" alt="location-icon">
                Location
            </p>
        </div>

        <div class="weather__main">
            <h1 class="weather__title">Highest/Lowest</h1>
            <p class="weather__description">Description</p>

            <ul class="weather__details">
                <li class="weather__detail">Feels Like<span class="weather__details-value">value</span></li>
                <li class="weather__detail">Pressure<span class="weather__details-value">value</span></li>
                <li class="weather__detail">Humidity<span class="weather__details-value">value</span></li>
                <li class="weather__detail">WIND<span class="weather__details-value">value</span></li>
            </ul>
        </div>
    </section>
    <script src="scripts/script.js"></script>
</body>
</html>
