<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>weather-web-app</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet">
        <link rel="stylesheet" href="/style/style.css">
    </head>
    <body>
        <section class="weather">
            <div class="weather__top">
                <p class="weather__date">Date</p>
                <p class="weather__location">
                    <img src="./img/location.svg" alt="location-icon">
                    Location
                </p>
            </div>

            <div class="weather__main">
                <h1 class="weather__title">Highest/Lowest</h1>
                <p class="weather__description">Description</p>

                <ul class="weather__parameters">
                    <li class="weather__parameter">Feels Like <span
                            class="weather__parameter-value">value</span></li>
                    <li class="weather__parameter">Pressure <span
                            class="weather__parameter-value">value</span></li>
                    <li class="weather__parameter">Humidity <span
                            class="weather__parameter-value">value</span></li>
                    <li class="weather__parameter">WIND <span
                            class="weather__parameter-value">value</span></li>
                </ul>
            </div>
        </section>
        <script src="scripts/script.js"></script>
    </body>
</html>
